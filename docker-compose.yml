services:
  db:
    image: postgres:16-alpine
    container_name: sibe-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-sibe_db2}
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-admin1234}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - sibe-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-postgres} -d ${POSTGRES_DB:-sibe_db2}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./SIBEBackend
      dockerfile: Dockerfile
    container_name: sibe-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_URL: jdbc:postgresql://db:5432/${POSTGRES_DB:-sibe_db2}
      DB_USERNAME: ${DB_USERNAME:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-admin1234}
      DDL_AUTO: ${DDL_AUTO:-update}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:4200,http://localhost}
      MAIL_HOST: ${MAIL_HOST:-smtp.gmail.com}
      MAIL_PORT: ${MAIL_PORT:-587}
      MAIL_USERNAME: ${MAIL_USERNAME:-sibeapplicationuco@gmail.com}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-atsiysuskgnqccrk}
    ports:
      - "${BACKEND_PORT:-8080}:8080"

  frontend:
    build:
      context: ./SIBEFrontend
      dockerfile: Dockerfile
    container_name: sibe-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-80}:80"

volumes:
  sibe-pgdata:
